<!DOCTYPE html>
<html>
<head>
<style>
img, video {
	width:100%;
}
body {
	color: white;
	font-family: "Consolas", monospace;
}
html {
	scrollbar-width: none;
}
/*@keyframes shadowappear {
	from {
		box-shadow: 1px 1px 3px 0.3px #aaaaaa;
	}
	to {
		box-shadow: 1.4px 1.7px 3px 0.4px #777777;
	}
}*/
button {
	margin: 0.3%;
	width: 48.8%;
	height: 30px;
	border: none;
	box-shadow: 1px 1px 1px 0.3px #aaaaaa;
	font-family: "Consolas", monospace;
	text-align: left;
	padding-left: 2%;
	cursor: pointer;
	
}
button:hover {
	/*animation: shadowappear 0.2s ease-out 0.1s;*/
}
#return {
	margin-bottom: 10px;
}
p {
	margin-bottom: 0px;
}
</style>
<script>
let fromBase64;

if(Uint8Array.fromBase64) {
	fromBase64 = Uint8Array.fromBase64;
} else {
	fromBase64 = function(str, options = {alphabet: null}) { // for compatibility
		let data = str;
		if(options.alphabet == "base64url") {
			data = data.replace(/-/, "+");
			data = data.replace(/_/, "/");
		}
		let array = new Uint8Array(atob(data).length);
		for (let i in atob(data)) {
			array[i] = atob(data).charCodeAt(i);
		}
		return array;
	};
}

var params = [new URLSearchParams(location.seach).get("key"), new URLSearchParams(location.seach).get("iv")];
if(params[0] && params[1]) {
	var key = crypto.subtle.importKey("raw", fromBase64(params[0], {alphabet:"base64url"}).buffer, {name: "AES-GCM", length: 256}, true, ["decrypt"]);
}

async function decrypt(id, data) {
	let iv = fromBase64(params[1]);
	for(let i in iv) {
		iv[i] = fromBase64(params[1])[i] ^ ((((((id * 3) << 3) * 5) << 2) * 7) % 256); // hopefully random characters makes it more secure!
	}
	return new Uint8Array(await crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, await key, data));
}

async function display(response, type, id) {
	console.log("Received " + id);
	let blob = new Blob([await decrypt(id, response)], {type: type});
	if(blob){console.log("Decrypted " + id);};
	blob.type = "image/webp";
	document.querySelector("#a" + id).src = URL.createObjectURL(blob);
}

function request(id, type) {
	let a = new XMLHttpRequest();
	a.onload = (function() {display(this.response, type, id)});
	a.responseType = "arraybuffer";
	a.open("GET", "/resources/" + id);
	a.send();
	console.log("Request sent for " + id);
}

function load(n, index0) {
	document.querySelector("#a").style.display = "none";
	document.querySelector("#return").style.display = "block";
	if(document.querySelector("#b" + n)) {
		document.querySelector("#b" + n).style.display = "block";
	} else {
		let index = JSON.parse(index0), c;
		c = document.createElement("div");
		c.setAttribute("id", "b" + n);
		c.setAttribute("class", "b");
		c.style.display = "block";
		document.querySelector("#b").appendChild(c);
		c = document.createElement("p");
		c.innerText = index.collections[n].name;
		document.querySelector("#b" + n).appendChild(c);
		for(let i in index.collections[n].contents){
			switch(/\w+/.exec(index.collections[n].contents[i].type)[0]) {
				case "text":
					c = document.createElement("p");
					c.innerHTML = index.collections[n].contents[i].text;
					document.querySelector("#b" + n).appendChild(c);
				break;
				case "image":
					c = document.createElement("img");
					c.id = "a" + index.collections[n].contents[i].id;
					c.setAttribute("alt", "Loading...");
					document.querySelector("#b" + n).appendChild(c);
					request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
				break;
				case "audio": // not tested
					c = document.createElement("audio");
					c.setAttribute("controls", "true");
					c.appendChild(document.createElement("source"));
					c.querySelector("source").id = "a" + index.collections[n].contents[i].id;
					document.querySelector("#b" + n).appendChild(c);
					request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
				break;
				case "video": // not tested
					c = document.createElement("video");
					c.setAttribute("controls", "true");
					c.appendChild(document.createElement("source"));
					c.querySelector("source").id = "a" + index.collections[n].contents[i].id;
					document.querySelector("#b" + n).appendChild(c);
					request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
				break;
			}
		}
	}
}

function refresh() {
	document.querySelector("#return").style.display = "none";
	document.querySelector("#a").style.display = "block";
	document.querySelector(".b[style*='display: block']").style.display = "none";
}
</script>
</head>
<body>
<div style="color:black;"><div id="key"></div><div id="index"></div></div>
<button id="return" style="display:none;" onclick="refresh();">return</button>
<div id="a"></div>
<div id="b"></div>
<script>
if(!key || !params[1]) {
	document.querySelector("#key").innerText = "The key is missing or malformed.";
}

let a = new XMLHttpRequest();
function loadIndex(index, dummy) {
	let bias0 = [6, 5, 4];
	let bias4 = 2;
	let bias1 = [Math.pow(Math.random(), bias0[0]) * bias4 + 1, Math.pow(Math.random(), bias0[1]) * bias4 + 1, Math.pow(Math.random(), bias0[2]) * bias4 + 1];
	let bias3 = Math.min(bias1[0], bias1[1], bias1[2]) - 1;
	bias1 = [bias1[0] - bias3, bias1[1] - bias3, bias1[2] - bias3];
	let bias2 = (bias1[0] + bias1[1] + bias1[2] - 3) / 4 + 1;
	for(let i in index.collections) {
		let r = Math.pow(Math.random(), bias1[0] + 1) * 48 / bias1[0] / bias2;
		let g = Math.pow(Math.random(), bias1[0] + 1) * 48 / bias1[1] / bias2;
		let b = Math.pow(Math.random(), bias1[0] + 1) * 48 / bias1[2] / bias2;
		let c = document.createElement("button");
		c.innerText = index.collections[i].name;
		c.style.background = "rgb(" + (r + 255 - 48 / bias1[0] / bias2) + "," + (g + 255 - 48 / bias1[1] / bias2) + "," + (b + 255 - 48 / bias1[2] / bias2) + ")";
		c.style.color = "rgb(" + (170 - 2 * r) + "," + (170 - 2 * g) + "," + (170 - 2 * b) + ")";
		if(!dummy && params[0] && params[1]) {
			c.setAttribute("onclick", "load(" + i + ",`" + this.responseText + "`)");
		}
		document.querySelector("#a").appendChild(c);
	}
}
a.onload = (function() {
	loadIndex(JSON.parse(this.responseText), 0);
	
});
a.onerror = (function() {
	document.querySelector("#index").innerText = "An exception occurred when the fetching the index. A dummy index is shown here.";
	let fakeIndex = {collections:[]};
	for(let i = 0; i < 64; i++) {
		fakeIndex.collections.push({name: i});
	}
	loadIndex(fakeIndex, 1);	
});
a.open("GET", "./index.json");
a.send();

let r = Math.random() * 55;
let g = Math.random() * 55;
let b = Math.random() * 55;
document.querySelector("#return").style.background = "rgb(" + (r + 200) + "," + (g + 200) + "," + (b + 200) + ")";
document.querySelector("#return").style.color = "rgb(" + (170 - 2 * r) + "," + (170 - 2 * g) + "," + (170 - 2 * b) + ")";
</script>
</body>
</html>
