<!DOCTYPE html>
<html>
<head>
<style>
body {
	color: white;
	font-family: "Consolas", monospace;
}
html {
	scrollbar-width: none;
	position:relative;
}
button {
	width: 100px;
	height: 30px;
	border: none;
	box-shadow: 1px 1px 1px 0.3px #AAAAAA;
	font-family: "Consolas", monospace;
	cursor: pointer;
	margin-bottom: 10px;
}
.colour {
	display: inline-block;
	width: 20px;
	height: 20px;
}
</style>
</head>
<body>
<button id="reload">reload</button>
<div id="a"></div>
<script>
if(new URLSearchParams(location.search).get("test")) {
	document.body.style.background = "#1E1E1E";
}

function calculation(bias2, c, b, a) {
	let bias4 = (bias2[0] + bias2[1] + bias2[2] - 3) / 4 + 1;
	return (Math.pow(Math.random(), bias2[c] + 1) * a / bias2[c] / bias4) + b - a / bias2[c] / bias4;
}

function colour(bias0, bias1, l, b, a) {
	let bias2 = [Math.pow(Math.random(), bias0[0]) * bias1 + 1, Math.pow(Math.random(), bias0[1]) * bias1 + 1, Math.pow(Math.random(), bias0[2]) * bias1 + 1];
	let bias3 = Math.min(bias2[0], bias2[1], bias2[2]) - 1;
	bias3 = (bias3 > 0.3 ? bias3 : 0);
	bias2 = [bias2[0] - bias3, bias2[1] - bias3, bias2[2] - bias3];
	let c = [];
	for(let i = 0; i < l; i++) {
		c.push([Math.round(calculation(bias2, 0, b, a)), Math.round(calculation(bias2, 1, b, a)), Math.round(calculation(bias2, 2, b, a))]);
	}
	return c;
}

function load() {
	let n = 16;
	let b = colour([4, 3, 1], 3, n, 255, 100);
	document.querySelector("#a").innerHTML = "";
	for(let i in b) {
		let a = document.createElement("div");
		let c = document.createElement("div");
		c.className = "colour";
		c.style.background = "rgb(" + b[i][0] + "," + b[i][1] + "," + b[i][2] + ")";
		c.innerHTML = "";
		a.appendChild(c);
		c = document.createElement("span");
		c.className = ".name";
		c.innerText = " #" + (b[i][0] < 16 ? "0" : "") + b[i][0].toString(16) + (b[i][1] < 16 ? "0" : "") + b[i][1].toString(16) + (b[i][2] < 16 ? "0" : "") + b[i][2].toString(16);
		a.appendChild(c);
		document.querySelector("#a").appendChild(a);
	}
	document.querySelector("#reload").style.background = "rgb(" + (Math.random() * 48 + 207) + "," + (Math.random() * 48 + 207) + "," + (Math.random() * 48 + 207) + ")";
}

document.querySelector("#reload").onclick = load;
load();
</script>
</body>
</html>
