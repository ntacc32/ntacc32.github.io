<!DOCTYPE html>
<html>
<head>
<title>mimosa</title>
<style>
img, video {
	width:100%;
}
body {
	color: white;
	font-family: "Roboto", monospace;
}
html {
	scrollbar-width: none;
}
button {
	margin: 0.3%;
	width: 48.8%;
	height: 30px;
	background: mintcream;
	border: none;
	box-shadow: 1px 1px 1px 0.3px #aaaaaa;
}
</style>
<script>
function fromBase64(str, options) { // for compatibility
	let data = str;
	if(options.alphabet == "base64url") {
		data = data.replace(/-/, "+");
		data = data.replace(/_/, "/");
	}
    let array = new Uint8Array(atob(data).length);
    for (let i in atob(data)) {
        array[i] = atob(data).charCodeAt(i);
    }
    return array;
}

const key = window.crypto.subtle.importKey("raw", fromBase64(new URLSearchParams(window.location.search).get("key"), {alphabet:"base64url"}).buffer, {name: "AES-GCM", length: 256}, true, ["decrypt"]);

async function decrypt(id, data) {
	let iv = fromBase64(new URLSearchParams(window.location.search).get("iv"));
	for(let i in iv) {
		iv[i] = fromBase64(new URLSearchParams(window.location.search).get("iv"))[i] ^ ((((((id * 3) << 3) * 5) << 2) * 7) % 256); // hopefully random characters makes it more secure!
	}
	return new Uint8Array(await crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, await key, data));
}

async function display(response, type, id) {
	let blob = new Blob([await decrypt(id, response)], {type: type});
	blob.type = "image/webp";
	document.querySelector("#a" + id).src = URL.createObjectURL(blob);
}

function request(id, type) {
	let a = new XMLHttpRequest();
	a.onload = (function() {display(this.response, type, id)});
	a.responseType = "arraybuffer";
	a.open("GET", "/resources/" + id);
	a.send();
}

function load(n, index0) {
	let index = JSON.parse(index0);
	document.querySelector("#a").style.display = "none";
	document.querySelector("#return").style.display = "block";
	for(let i in index.collections[n].contents){
		let c;
		switch(/\w+/.exec(index.collections[n].contents[i].type)[0]) {
			case "text":
				c = document.createElement("p");
				c.innerText = index.collections[n].contents[i].text;
				document.querySelector("#b").appendChild(c);
			break;
			case "image":
				c = document.createElement("img");
				c.id = "a" + index.collections[n].contents[i].id;
				document.querySelector("#b").appendChild(c);
				request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
			break;
			case "audio": // not tested
				c = document.createElement("audio");
				c.id = "a" + index.collections[n].contents[i].id;
				c.setAttribute("controls", "true");
				document.querySelector("#b").appendChild(c);
				request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
			break;
			case "video": // not tested
				c = document.createElement("video");
				c.setAttribute("controls", "true");
				c.appendChild(document.createElement("source"));
				c.querySelector("source").id = "a" + index.collections[n].contents[i].id;
				document.querySelector("#b").appendChild(c);
				request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
			break;
		}
	}
}

let a = new XMLHttpRequest();
a.onload = (function load() {
	let index = JSON.parse(this.responseText);
	for(let i in index.collections) {
		let b = document.createElement("button");
		b.innerText = index.collections[i].name;
		b.setAttribute("onclick", "load(" + i + ",`" + this.responseText + "`)");
		document.querySelector("#a").appendChild(b);
	}
});
a.open("GET", "/index.json");
a.send();
</script>
</head>
<body>
<button id="return" style="display:none;">return</button>
<div id="a"></div>
<div id="b"></div>
</body>
</html>
