<!DOCTYPE html>
<html>
<head>
<style>
img, video {
	width:100%;
}
body {
	color: white;
	font-family: "Consolas", monospace;
	background: Canvas;
}
html {
	scrollbar-width: none;
	position:relative;
}

		box-shadow: 1px 1px 3px 0.3px #AAAAAA;
	}

		box-shadow: 1.4px 1.7px 3px 0.4px #777777;

button {
	margin: calc(min(1.5px, 0.3%));
	width: 48.8%;
	height: 30px;
	border: none;
	box-shadow: 1px 1px 1px 0.3px #AAAAAA;
	font-family: "Consolas", monospace;
	text-align: left;
	padding-left: 2%;
	cursor: pointer;
	color: #1E1E1E;
}
button:hover {
	/*animation: shadowappear 0.2s ease-out 0.1s;*/
}
#return {
	margin-bottom: 10px;
}
p {
	margin-bottom: 0px;
}
#bg, #blur {
	position: absolute;
	left: 0px;
	top: 0px;
	width: 100%;
	height: 100%;
	z-index: -1;
	overflow: hidden;
}
#a, #b {
	width: calc(min(100%, 500px));
}
</style>
<script>
let fromBase64;

if(Uint8Array.fromBase64) {
	fromBase64 = Uint8Array.fromBase64;
} else {
	fromBase64 = function(str, options = {alphabet: null}) { // for compatibility
		let data = str;
		if(options.alphabet == "base64url") {
			data = data.replace(/-/, "+");
			data = data.replace(/_/, "/");
		}
		let array = new Uint8Array(atob(data).length);
		for (let i in atob(data)) {
			array[i] = atob(data).charCodeAt(i);
		}
		return array;
	};
}

var params = [new URLSearchParams(location.search).get("key"), new URLSearchParams(location.search).get("iv")];
if(params[0] && params[1]) {
	var key = crypto.subtle.importKey("raw", fromBase64(params[0], {alphabet:"base64url"}).buffer, {name: "AES-GCM", length: 256}, true, ["decrypt"]);
}

async function decrypt(id, data) {
	let iv = fromBase64(params[1]);
	for(let i in iv) {
		iv[i] = fromBase64(params[1])[i] ^ ((((((id * 3) << 3) * 5) << 2) * 7) % 256); // hopefully random characters makes it more secure!
	}
	return new Uint8Array(await crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, await key, data));
}

async function display(response, type, id) {
	console.log("Received " + id);
	let blob = new Blob([await decrypt(id, response)], {type: type});
	if(blob){console.log("Decrypted " + id);};
	blob.type = "image/webp";
	document.querySelector("#a" + id).src = URL.createObjectURL(blob);
}

function request(id, type) {
	let a = new XMLHttpRequest();
	a.onload = (function() {display(this.response, type, id)});
	a.responseType = "arraybuffer";
	a.open("GET", "/resources/" + id);
	a.send();
	console.log("Request sent for " + id);
}

function load(n, index0) {
	document.querySelector("#a").style.display = "none";
	document.querySelector("#return").style.display = "block";
	if(document.querySelector("#b" + n)) {
		document.querySelector("#b" + n).style.display = "block";
	} else {
		let index = JSON.parse(index0), c;
		c = document.createElement("div");
		c.setAttribute("id", "b" + n);
		c.setAttribute("class", "b");
		c.style.display = "block";
		document.querySelector("#b").appendChild(c);
		c = document.createElement("p");
		c.innerText = index.collections[n].name;
		document.querySelector("#b" + n).appendChild(c);
		for(let i in index.collections[n].contents){
			switch(/\w+/.exec(index.collections[n].contents[i].type)[0]) {
				case "text":
					c = document.createElement("p");
					c.innerHTML = index.collections[n].contents[i].text;
					document.querySelector("#b" + n).appendChild(c);
				break;
				case "image":
					c = document.createElement("img");
					c.id = "a" + index.collections[n].contents[i].id;
					c.setAttribute("alt", "Loading...");
					document.querySelector("#b" + n).appendChild(c);
					request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
				break;
				case "audio": // not tested
					c = document.createElement("audio");
					c.setAttribute("controls", "true");
					c.appendChild(document.createElement("source"));
					c.querySelector("source").id = "a" + index.collections[n].contents[i].id;
					document.querySelector("#b" + n).appendChild(c);
					request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
				break;
				case "video": // not tested
					c = document.createElement("video");
					c.setAttribute("controls", "true");
					c.appendChild(document.createElement("source"));
					c.querySelector("source").id = "a" + index.collections[n].contents[i].id;
					document.querySelector("#b" + n).appendChild(c);
					request(index.collections[n].contents[i].id, index.collections[n].contents[i].type);
				break;
			}
		}
	}
}

function refresh() {
	document.querySelector("#return").style.display = "none";
	document.querySelector("#a").style.display = "block";
	document.querySelector(".b[style*='display: block']").style.display = "none";
}
</script>
</head>
<body>
<div id="bg"></div>
<div id="blur"></div>
<div style="color:#AAAAAA;"><div id="key"></div><div id="index"></div></div>
<button id="return" style="display:none;" onclick="refresh();">return</button>
<div id="a"></div>
<div id="b"></div>
<script>
if(window.getComputedStyle(document.body).background == "rgb(255, 255, 255)") {
	document.body.style.background = "#1E1E1E";
}

if(!key || !params[1]) {
	document.querySelector("#key").innerText = "The key is missing or malformed.";
}

function calculation(bias2, c, b, a) {
	let bias4 = (bias2[0] + bias2[1] + bias2[2] - 3) / 4 + 1;
	return (Math.pow(Math.random(), bias2[c] + 1) * a / bias2[c] / bias4) + b - a / bias2[c] / bias4;
}

function colour(bias0, bias1, l, b, a) {
	let bias2 = [Math.pow(Math.random(), bias0[0]) * bias1 + 1, Math.pow(Math.random(), bias0[1]) * bias1 + 1, Math.pow(Math.random(), bias0[2]) * bias1 + 1];
	let bias3 = Math.min(bias2[0], bias2[1], bias2[2]) - 1;
	bias3 = (bias3 > 0.3 ? bias3 : 0);
	bias2 = [bias2[0] - bias3, bias2[1] - bias3, bias2[2] - bias3];
	let c = [];
	for(let i = 0; i < l; i++) {
		c.push([calculation(bias2, 0, b, a), calculation(bias2, 1, b, a), calculation(bias2, 2, b, a)]);
	}
	return c;
}

let a = new XMLHttpRequest();
function loadIndex(index, dummy, index0) {
	let b = colour([5, 4, 3], 2, index.collections.length, 255, 48);
	for(let i in b) {
		let c = document.createElement("button");
		c.innerText = index.collections[i].name;
		c.style.background = "rgb(" + b[i][0] + "," + b[i][1] + "," + b[i][2] + ")";
		if(!dummy && params[0] && params[1]) {
			c.setAttribute("onclick", "load(" + i + ",`" + index0 + "`)");
		}
		document.querySelector("#a").appendChild(c);
	}
}
a.onload = (function() {
	loadIndex(JSON.parse(this.responseText), 0, this.responseText);
	
});
a.onerror = (function() {
	document.querySelector("#index").innerText = "An exception occurred when fetching the index. A dummy index is shown here.";
	let fakeIndex = {collections:[]};
	for(let i = 0; i < 64; i++) {
		fakeIndex.collections.push({name: i});
	}
	loadIndex(fakeIndex, 1, 0);	
});
a.open("GET", "./index.json");
a.send();

document.querySelector("#return").style.background = "rgb(" + (Math.random() * 55 + 200) + "," + (Math.random() * 55 + 200) + "," + (Math.random() * 55 + 200) + ")";

function bubble() {
	this.r = Math.random() * 50 + 50;
	this.x = Math.random() * (document.body.scrollWidth + this.r * 2) - this.r;
	this.y = document.body.scrollHeight + this.r;
	this.vx = (Math.random() - 0.5) / 10;
	this.vy = (Math.random() + 1) / 10;
	this.c = [Math.random() * 255, Math.random() * 255, Math.random() * 255, Math.random() / 20 + 0.02];
	this.tag = document.createElement("div");
	this.tag.style.borderRadius = "50%";
	this.tag.style.position = "absolute";
	this.tag = document.querySelector("#bg").appendChild(this.tag);
	this.update = function() {
		this.x += this.vx;
		this.y -= this.vy;
		this.c[3] *= 0.9999;
		this.r *= 1.0001;
		this.tag.style.background = "rgba(" + this.c[0] + "," + this.c[1] + "," + this.c[2] + "," + this.c[3] + ")";
		this.tag.style.left = this.x + "px";
		this.tag.style.top = this.y + "px";
		this.tag.style.width = this.r + "px";
		this.tag.style.height = this.r + "px";
		return this.tag0;
	}
}

var effects = [[Math.round(Math.random()), Math.random()], [new URLSearchParams(location.search).get("shimmer"), 0.01]];
if(effects[0][0]) {
	document.querySelector("#blur").style.backdropFilter = "blur(5px)";
	var bubbles = [];
	window.setInterval(() => {
		for(let i in bubbles) {
			bubbles[i].update();
			if(bubbles[i].y < 0 - bubbles[i].r) {
				bubbles.splice(i, 1);
				i--;
			}
		}
		if(Math.random() < (effects[0][1] * 0.5 + 0.5) * 0.02) {
			bubbles.push(new bubble());
		}
	}, 30);
}
if(effects[1][0]) {
	var shimmers = 10, shimmer = [colour([0, 7, 5], 2, shimmers, 200, 80), colour([1, 7, 5], 2, shimmers, 200, 80), [], [], [], []], grad;
	for(let i = 0; i < shimmers; i++) {
		shimmer[2].push(Math.random() / 1);
		shimmer[3].push(Math.random() / 1);
		shimmer[4].push(40 / shimmers * (i + Math.pow(Math.random(), 3)) + 140);
		shimmer[5].push(40 / shimmers * (i + Math.pow(Math.random(), 3)) + 140);
	}
	window.setInterval(() => {
		grad = "conic-gradient(at -20% -100%";
		for(let i = 0; i < shimmers; i++) {
			shimmer[0][i][0] += (shimmer[1][i][0] - shimmer[0][i][0]) / 100;
			shimmer[0][i][1] += (shimmer[1][i][1] - shimmer[0][i][1]) / 100;
			shimmer[0][i][2] += (shimmer[1][i][2] - shimmer[0][i][2]) / 100;
			shimmer[2][i] += (shimmer[3][i] - shimmer[2][i]) / 100;
			shimmer[4][i] += (shimmer[5][i] - shimmer[4][i]) / 100;
			grad = grad.concat(",rgba(", Math.round(shimmer[0][i][0]), ",", Math.round(shimmer[0][i][1]), ",", Math.round(shimmer[0][i][2]), ",", shimmer[2][i], ") ", Math.round(shimmer[4][i]), "deg");	
		}
		grad = grad + ")"
		document.querySelector("#bg").style.background = grad;
		if(Math.random() < effects[1][1]) {
			shimmer[1] = colour([1, 7, 5], 2, shimmers, 200, 30);
			console.log("hi");
			for(let i = 0; i < 8; i++) {
				shimmer[3][i] = Math.random() / 10;
				shimmer[5].push(40 / shimmers * (i + Math.pow(Math.random(), 3)) + 140);
			}
		}
	}, 30);
	document.querySelector("#bg").style.background = "conic-gradient(at -80% -100%, )"
}
</script>
</body>
